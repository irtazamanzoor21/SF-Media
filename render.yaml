# Render Blueprint for SF Media — https://render.com/docs/blueprint-spec
#
# A persistent Node web service (NOT serverless), so the background schedulers,
# WebSocket upload progress, and Companion uploads all work.
#
# Notes:
# - Build installs devDeps (tsx/vite/esbuild) because NODE_ENV is unset during build;
#   `npm start` sets NODE_ENV=production at runtime.
# - PORT is provided by Render automatically (the app reads process.env.PORT).
# - APP_BASE_URL is set explicitly below so every module (incl. the email module,
#   which reads it at import time) sees it from process start. Update it for a
#   custom domain.
# - All secrets are `sync: false` (you enter them in the Render dashboard; nothing
#   secret is committed).
services:
  - type: web
    name: sf-media
    runtime: node
    plan: free            # change to "starter" (~$7/mo) for always-on (no spin-down → schedulers run 24/7)
    branch: main
    # Heap ceilings are set PER-COMMAND, not via a global NODE_OPTIONS env var,
    # because build and runtime have opposite needs:
    #   • Build: the Vite/esbuild step needs a HIGH ceiling (~2GB) or it OOMs.
    #   • Runtime: the instance is only 512MB. --max-old-space-size caps ONLY V8's
    #     old-space heap; off-heap memory (aws-sdk v2 pulled in by Companion, pg, ws,
    #     native modules, the bundle ~3MB) stacks ON TOP of it. A 400 cap left
    #     400(heap)+~150(off-heap) > 512 → container OOM-kill → crash loop. So the
    #     heap is capped to 256: the app's real working set is ~97MB, so 256 is
    #     ample for live objects, and 256+off-heap stays safely under 512.
    # An inline `NODE_OPTIONS=...` on each command also OVERRIDES any stale
    # NODE_OPTIONS still synced onto the service from an earlier blueprint.
    buildCommand: npm install && NODE_OPTIONS=--max-old-space-size=2048 npm run build
    startCommand: NODE_OPTIONS=--max-old-space-size=256 npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set explicitly (not just relying on the RENDER_EXTERNAL_URL code-fallback):
      # the email module captures APP_BASE_URL at import time, before that fallback
      # runs, so without this its links point at localhost. Change this if you move
      # to a custom domain.
      - key: APP_BASE_URL
        value: "https://sf-media.onrender.com"
      # ── Required ──
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPER_ADMIN_SETUP_TOKEN
        sync: false
      # ── Google sign-in + Companion (Drive) ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: COMPANION_GOOGLE_KEY
        sync: false
      - key: COMPANION_GOOGLE_SECRET
        sync: false
      - key: COMPANION_SECRET
        sync: false
      # ── Social platforms ──
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      # ── Optional (email + extra Companion providers + X OAuth1) ──
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      # - key: X_OAUTH1_TOKEN
      # - key: X_OAUTH1_TOKEN_SECRET
      # - key: COMPANION_ONEDRIVE_KEY
      # - key: COMPANION_ONEDRIVE_SECRET
      # - key: COMPANION_UNSPLASH_KEY
      # - key: APP_BASE_URL   # only needed for a custom domain
